<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Victory Blinds &mdash; Rep Product Tool</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#8A7A52">
<meta name="color-scheme" content="light">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Victory">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23231F20'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='bold' fill='%238A7A52' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23231F20'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='bold' fill='%238A7A52' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
</head>
<body>
<style>
  :root{
    --paper:#FBFAF7; --paper2:#F4F2EA; --card:#FFFFFF;
    --ink:#231F20; --ink-soft:#48453E; --muted:#7C776E;
    --bronze:#8A7A52; --bronze-deep:#6F6140; --bronze-tint:#F1ECDF;
    --sage:#DEE1D5; --sage-mid:#C2CBB2; --sage-deep:#657153; --sage-tint:#EEF0E9;
    --olive:#3B3829; --olive-ink:#F3EFE3;
    --line:#E6E1D5; --line-soft:#F0ECE2; --good:#5E7350;
    --shadow:0 1px 2px rgba(35,31,32,.04),0 10px 34px rgba(35,31,32,.06);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Helvetica,Arial,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  }
  :root[data-theme="light"]{
    --paper:#FBFAF7; --paper2:#F4F2EA; --card:#FFFFFF; --ink:#231F20; --ink-soft:#48453E; --muted:#7C776E;
    --bronze:#8A7A52; --bronze-deep:#6F6140; --bronze-tint:#F1ECDF; --sage:#DEE1D5; --sage-mid:#C2CBB2;
    --sage-deep:#657153; --sage-tint:#EEF0E9; --olive:#3B3829; --olive-ink:#F3EFE3;
    --line:#E6E1D5; --line-soft:#F0ECE2; --good:#5E7350; --shadow:0 1px 2px rgba(35,31,32,.04),0 10px 34px rgba(35,31,32,.06);
  }

  :root{color-scheme:light}
  *{box-sizing:border-box}
  html,body{overflow-x:hidden;max-width:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums}
  h1,h2,h3,h4{margin:0;font-weight:300;letter-spacing:-.01em;line-height:1.1;text-wrap:balance}
  .display{font-weight:200;letter-spacing:-.02em}
  .label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze)}
  .muted{color:var(--muted)} .small{font-size:13px}
  a{color:var(--bronze-deep)}

  /* top bar */
  header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:saturate(120%) blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:1120px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .wordmark .name{font-family:var(--serif);font-size:19px;letter-spacing:.16em;font-weight:600;color:var(--ink)}
  .wordmark .sub{font-size:8px;letter-spacing:.36em;color:var(--bronze);font-weight:700;display:block;margin-top:1px}
  .repflag{margin-left:auto;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--bronze-deep);background:var(--bronze-tint);padding:5px 11px;border-radius:999px}
  nav.tabs{max-width:1120px;margin:0 auto;padding:0 12px;display:flex;gap:2px;overflow-x:auto}
  nav.tabs button{flex:none;appearance:none;border:none;background:none;font-family:inherit;cursor:pointer;
    font-size:14px;font-weight:600;color:var(--muted);padding:13px 16px;border-bottom:2.5px solid transparent;
    letter-spacing:.01em;white-space:nowrap}
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--bronze)}
  nav.tabs button.accent[aria-selected="true"]{border-bottom-color:var(--sage-deep)}
  nav.tabs button:focus-visible{outline:2px solid var(--bronze);outline-offset:-4px;border-radius:4px}

  main{max-width:1120px;margin:0 auto;padding:30px 20px 90px}
  .panel{display:none;animation:fade .25s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.panel,.panel.active{animation:none}}

  /* generic blocks */
  .phead.has-hero{display:grid;grid-template-columns:1fr 400px;gap:34px;align-items:center}
  @media(max-width:820px){.phead.has-hero{grid-template-columns:1fr;gap:20px}
    .phead.has-hero .phero-img{order:-1}}
  .phero-img{border-radius:10px;overflow:hidden;background:var(--paper2);border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(35,31,32,.04),0 12px 30px rgba(35,31,32,.08)}
  .phero-img img{display:block;width:100%;height:100%;aspect-ratio:4/3;object-fit:cover}
  .phead .idx{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze)}
  .phead h2{font-size:clamp(28px,5vw,40px);margin:6px 0 10px}
  .phead .pos{font-size:15.5px;color:var(--ink-soft);max-width:66ch;line-height:1.6}
  .bestfor{display:flex;flex-wrap:wrap;gap:18px;margin-top:14px}
  .bestfor b{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-deep)}
  .bestfor b:before{content:"\2014\00a0\00a0";color:var(--sage-mid)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:26px;align-items:start}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow);padding:22px 24px}
  h4.mini{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze);font-weight:700;margin:0 0 14px}
  .sectlead{margin:38px 0 0}
  .sectlead h3{font-size:20px}
  .sectlead .rule{height:1px;background:var(--line);margin:12px 0 0}

  /* specs */
  .specs-faq .a{padding:4px 18px 16px}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 44px}
  @media(max-width:820px){.sgrid{grid-template-columns:1fr}}
  .specs-faq summary{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--bronze);font-weight:800}
  .sgroup{break-inside:avoid;page-break-inside:avoid;margin-bottom:4px}
  .sgrp{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--bronze);font-weight:800;
    margin:20px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
  .sgroup:first-child .sgrp{margin-top:0;padding-top:0;border-top:none}
  .sr{display:grid;grid-template-columns:38% 1fr;gap:14px;padding:8px 0;
    border-bottom:1px solid var(--line-soft);font-size:13px;align-items:start}
  .sr:last-child{border-bottom:none}
  .sr .lab{color:var(--muted);font-weight:500;line-height:1.4}
  .sr .val{text-align:left;font-weight:600;line-height:1.45}
  .sr .val.on{color:var(--good);font-weight:700}
  .chips-v{display:flex;flex-wrap:wrap;gap:5px}
  .chips-v i{font-style:normal;font-size:11px;font-weight:600;background:var(--paper2);
    border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--ink-soft);
    white-space:normal;max-width:100%;overflow-wrap:anywhere}
  .fill{color:var(--bronze-deep);font-weight:700;border-bottom:1.5px dotted var(--bronze);font-size:.92em;white-space:nowrap}

  /* cheat wins */
  .win{counter-reset:w;display:grid;gap:12px}
  .win .w{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start}
  .win .w:before{counter-increment:w;content:counter(w);font-size:12px;width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--bronze);color:var(--bronze-deep);display:grid;place-items:center;flex:none;font-variant-numeric:tabular-nums}
  .win .w b{font-size:14px;font-weight:600}
  .win .w span{display:block;font-size:13px;color:var(--ink-soft);margin-top:1px}
  .persona{border-left:2px solid var(--sage-mid);padding:2px 0 2px 13px;margin-bottom:12px}
  .persona .pt{font-weight:600;font-size:14px;display:flex;justify-content:space-between;gap:10px;align-items:baseline}
  .persona .who{color:var(--bronze);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;flex:none}
  .persona .pd{font-size:13px;color:var(--ink-soft);margin-top:3px}

  /* range table */
  .table-scroll{overflow-x:auto;margin-top:6px}
  table.matrix{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
  .matrix th,.matrix td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  .matrix thead th{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--bronze);font-weight:700;border-bottom:1.5px solid var(--bronze)}
  .matrix td:first-child{font-weight:700}
  .matrix td.c{text-align:center}
  .matrix .grouprow td{background:var(--bronze-tint);color:var(--bronze-deep);font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:7px 12px}
  .matrix .styl{font-size:11px;color:var(--muted)}
  .matrix .flag{color:var(--bronze-deep);font-weight:700}
  /* range rows -> colour list */
  .matrix .rrow{cursor:pointer}
  .matrix .rrow:hover td{background:var(--bronze-tint)}
  .matrix .rrow:focus-visible{outline:2px solid var(--bronze);outline-offset:-2px}
  .matrix .rrow.open td{background:var(--bronze-tint);border-bottom-color:transparent}
  .matrix .chev{color:var(--bronze);font-weight:700;font-size:15px;width:34px}
  .matrix .colrow td{background:var(--paper2);border-bottom:1px solid var(--line);padding:14px 16px}
  .swatches.empty{color:var(--muted);font-size:12.5px}
  .swhead{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--bronze);
    font-weight:800;margin-bottom:10px}
  .swhead .offnote{color:var(--muted);font-weight:700}
  .swlist{list-style:none;margin:0;padding:0;columns:4;column-gap:26px}
  @media(max-width:900px){.swlist{columns:3}}
  @media(max-width:640px){.swlist{columns:2}}
  @media(max-width:460px){.swlist{columns:1}}

  /* Phones: drop the min-width so the grid fits without sideways scrolling, and
     hide the secondary columns so Range / Shades / the + toggle are always reachable. */
  @media(max-width:640px){
    table.matrix{min-width:0}
    .matrix .opt{display:none}
    .matrix th,.matrix td{padding:11px 8px}
    .matrix .chev{width:26px}
    .matrix .colrow td{padding:12px 10px}
  }
  .sw{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:capitalize;
    padding:3px 0;break-inside:avoid;border-bottom:1px solid var(--line-soft)}
  .sw.off{color:var(--muted)}
  .sw.off span{text-decoration:line-through;text-decoration-color:var(--bronze);text-decoration-thickness:1px}
  .sw em{flex:none;font-style:normal;font-size:8.5px;font-weight:800;letter-spacing:.08em;
    text-transform:uppercase;color:var(--bronze-deep);background:var(--bronze-tint);
    border-radius:3px;padding:1px 5px}
  /* unavailable range */
  .matrix .rrow.off td:not(.chev){opacity:.6}
  .rpill{margin-left:8px;font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--bronze-deep);background:var(--bronze-tint);border-radius:3px;padding:2px 6px;
    vertical-align:middle;text-transform:uppercase}

  .avail{display:inline-flex;gap:5px;flex-wrap:wrap}
  .avail span{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--sage-deep);background:var(--sage-tint);
    border:1px solid var(--sage-mid);border-radius:4px;padding:2px 6px}

  /* faq accordion */
  .faq{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--card)}
  .faq details{border-bottom:1px solid var(--line)}
  .faq details:last-child{border-bottom:none}
  .faq summary{cursor:pointer;list-style:none;padding:14px 18px;font-weight:600;font-size:14.5px;display:flex;justify-content:space-between;gap:12px;align-items:center}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary:after{content:"+";color:var(--bronze);font-weight:400;font-size:20px;transition:transform .2s}
  .faq details[open] summary:after{transform:rotate(45deg)}
  .faq .a{padding:0 18px 16px;font-size:13.5px;color:var(--ink-soft);line-height:1.6}
  /* measure check */
  .mcheck{background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:22px 24px;margin-top:18px;box-shadow:var(--shadow)}
  .mchead{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
  .mcfit{margin-bottom:16px}
  .mcgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:700px){.mcgrid{grid-template-columns:repeat(2,1fr)}}
  .mcgrid label{display:flex;flex-direction:column;gap:6px;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);font-weight:800}
  /* display:flex above beats the UA [hidden]{display:none}, so restate it with higher specificity */
  .mcgrid label[hidden]{display:none}
  /* 16px stops iOS zooming the page when a rep taps a field */
  .mcgrid input{font-family:inherit;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;
    padding:10px 12px;border:1.5px solid var(--line);border-radius:6px;background:var(--paper);
    color:var(--ink);width:100%;-webkit-appearance:none;appearance:none;margin:0}
  .mcgrid input:focus{outline:none;border-color:var(--bronze);box-shadow:0 0 0 3px var(--bronze-tint)}
  .mc-hint{margin-top:14px;padding:11px 14px;border-radius:6px;background:var(--paper2);
    border:1px dashed var(--line);font-size:13px;color:var(--ink);line-height:1.55}
  .mc-hint b{font-variant-numeric:tabular-nums}
  .mc-hint-note{color:var(--muted)}
  .mcactions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .mc-result{display:grid;gap:10px;margin-top:18px}
  .mres{border-radius:6px;padding:13px 16px;font-size:13.5px;line-height:1.6;border-left:3px solid}
  .mres.ok{background:var(--sage-tint);border-color:var(--sage-deep);color:var(--ink)}
  .mres.warn{background:var(--bronze-tint);border-color:var(--bronze);color:var(--ink)}
  .mres.bad{background:var(--olive);border-color:var(--bronze);color:var(--olive-ink)}
  .mres.bad b{color:#fff}
  .mc-caveat{margin:16px 0 0;font-size:12px;color:var(--muted);line-height:1.55;
    border-top:1px dashed var(--line);padding-top:12px}
  .mc-caveat b{color:var(--ink)}

  /* measure it right */
  .measure-cols{columns:2;column-gap:44px;margin-top:20px}
  @media(max-width:860px){.measure-cols{columns:1}}
  .mgroup{break-inside:avoid;page-break-inside:avoid;margin-bottom:20px}
  .mgroup .sgrp{margin-top:0;padding-top:0;border-top:none;margin-bottom:10px}
  .measure-empty{margin-top:16px;background:var(--bronze-tint);border:1px dashed var(--bronze);
    border-radius:8px;padding:18px 20px;font-size:13.5px;color:var(--ink-soft);line-height:1.6}
  .measure-empty b{color:var(--ink)}

  .kncount{font-size:10.5px;font-weight:700;color:var(--bronze-deep);background:var(--bronze-tint);
    border-radius:999px;padding:2px 8px;margin-left:10px;font-variant-numeric:tabular-nums}
  ul.kn{margin:0;padding:0;list-style:none;display:grid;gap:12px}
  ul.kn li{display:grid;gap:2px;padding-left:14px;border-left:2px solid var(--sage-mid)}
  ul.kn li b{font-size:13.5px;font-weight:700;color:var(--ink)}
  ul.kn li span{font-size:13.5px;color:var(--ink-soft);line-height:1.55}

  /* sell */
  .obj{display:grid;gap:12px}
  .obj .o{border-left:2px solid var(--sage-mid);padding:2px 0 2px 13px}
  .obj .q{font-weight:600;font-size:13.5px;font-style:italic}
  .obj .q:before{content:"\201C"}.obj .q:after{content:"\201D"}
  .obj .aa{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .tip{background:var(--olive);color:var(--olive-ink);border-radius:5px;padding:15px 17px;font-size:13.5px;line-height:1.55;margin-top:16px}
  .tip b{color:#fff}
  .tip .th{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze);font-weight:700;margin-bottom:6px}
  .xsell{margin-top:14px;font-size:13px;border-top:1px dashed var(--line);padding-top:12px}
  .xsell b{color:var(--bronze-deep)}

  /* recommend */
  .reco-hero{max-width:70ch}
  .qs{display:grid;grid-template-columns:1fr 1fr;gap:22px 30px;margin-top:26px}
  @media(max-width:720px){.qs{grid-template-columns:1fr}}
  .q .ql{font-size:14px;font-weight:600;margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chips button{appearance:none;font-family:inherit;cursor:pointer;font-size:13px;font-weight:600;
    padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft)}
  .chips button:hover{border-color:var(--bronze-deep)}
  .chips button[aria-pressed="true"]{background:var(--bronze);border-color:var(--bronze);color:#fff}
  .chips button:focus-visible{outline:2px solid var(--bronze);outline-offset:2px}
  .reco-actions{display:flex;gap:12px;align-items:center;margin-top:28px;flex-wrap:wrap}
  .btn{appearance:none;font-family:inherit;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.02em;
    padding:12px 22px;border-radius:6px;border:none;background:var(--bronze);color:#fff}
  .btn:hover{background:var(--bronze-deep)}
  .btn.ghost{background:none;border:1.5px solid var(--line);color:var(--ink-soft)}
  .btn:focus-visible{outline:2px solid var(--bronze);outline-offset:2px}
  #recoResult{margin-top:30px}
  .result{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--bronze);border-radius:6px;box-shadow:var(--shadow);padding:26px 28px}
  .result .rlabel{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bronze);font-weight:700}
  .result h3{font-size:26px;margin:6px 0 2px}
  .result .fab{font-size:15px;color:var(--sage-deep);font-weight:700}
  .result .why{margin:16px 0 0;padding:0;list-style:none;display:grid;gap:7px}
  .result .why li{font-size:13.5px;color:var(--ink-soft);padding-left:20px;position:relative}
  .result .why li:before{content:"\2713";position:absolute;left:0;color:var(--sage-deep);font-weight:800}
  .rangepicks{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .rangepicks .rp{border:1px solid var(--line);border-radius:6px;padding:12px 15px;min-width:150px;background:var(--paper2)}
  .rangepicks .rp .rn{font-weight:700;font-size:14px}
  .rangepicks .rp .rd{font-size:12px;color:var(--muted);margin-top:2px}
  .repnotes{background:var(--bronze-tint);border-radius:5px;padding:14px 16px;margin-top:18px;font-size:13px;color:var(--ink)}
  .repnotes .th{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;margin-bottom:7px}
  .repnotes ul{margin:0;padding-left:18px}.repnotes li{margin:4px 0}
  .jump{margin-top:16px;font-size:13px}

  /* leaderboard */
  .lbtotals{display:flex;flex-wrap:wrap;gap:34px;margin-bottom:24px}
  .lbtotals div{display:flex;flex-direction:column;gap:2px}
  .lbnum{font-size:32px;font-weight:200;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .lblab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--bronze);font-weight:700}
  .lbtable{display:grid;gap:8px}
  .lbrow{display:grid;grid-template-columns:32px 1.1fr 2fr auto;gap:16px;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:6px;padding:12px 16px}
  .lbrow.top{border-color:var(--bronze)}
  .lbrank{font-size:13px;font-weight:800;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}

/* Match a range name to its colour list, tolerant of dashes, entities, case and spacing. */
function normName(s){
  return String(s)
    .replace(/&mdash;|&ndash;|&#x201[34];/gi,'-')
    .replace(/&amp;/gi,'&')
    .replace(/[^a-z0-9%&]+/gi,' ')
    .replace(/\s+/g,' ').trim().toLowerCase();
}
let COLOUR_INDEX=null;
function colourIndex(){
  if(COLOUR_INDEX) return COLOUR_INDEX;
  COLOUR_INDEX={};
  for(const k in COLOURS) COLOUR_INDEX[normName(k)]=COLOURS[k];
  return COLOUR_INDEX;
}
function coloursFor(range){ return colourIndex()[normName(range)] || []; }

 ["roller","Fabric &amp; light types","Sunscreen openness %","The % is the size of the holes in the weave. We offer 5% and 10% &mdash; a lower % means smaller holes: more privacy, less view. Plainer feel than a translucent."],
 ["roller","Fabric &amp; light types","Sunscreen has no night privacy","You can see through it, and the darker the fabric the more you see through. At night with lights on inside it gives no privacy at all &mdash; always pair it with a blockout."],

 ["roller","Choosing by room","Kitchen &amp; wet areas","Prefer a plain/painted fabric &mdash; it wipes grease off cleanest. Avoid textured fabrics (hard to clean) and standard sunscreen (dirt and oil catch in the mesh); if they want sunscreen, go to near-zero openness. Our chains are stainless so rust isn&rsquo;t a worry, and a nylon chain is also a good call in humid rooms."],
 ["roller","Choosing by room","Bedrooms","The double roller is the go-to: sunscreen for the daytime view, blockout for night privacy. Fitting matters more here than anywhere else."],
 ["roller","Choosing by room","Bay windows","Rollers are poor for true light and privacy control in a bay &mdash; close the corner gaps and you open the end gaps. Steer to a shutter, a curtain on a bent track, or honeycomb."],

 ["roller","Fit for darkness","Reveal vs face fit","Reveal fit (inside the recess) is the default where there&rsquo;s room &mdash; neat, but it always leaves side light gaps. Face fit on the architrave cuts direct light: the choice when darkness is the goal."],
 ["roller","Fit for darkness","Pelmet &amp; reverse roll","A fabric-wrapped pelmet hides the roll and lifts the look. A reverse roll (fabric over the front of the tube) sits closer to the glass &mdash; less light bleed, and it hides the roll too."],
 ["roller","Fit for darkness","Double roller order","Sheer/sunscreen behind, blockout in front. With the sunscreen down and the blockout up, the blockout sits above and hides the roll &mdash; neater. Almost every order is this way round."],

 ["roller","Double roller vs curtains","A double roller blocks more sun","A sunscreen roller cuts more sun than a sheer curtain, which sits on the face and is largely aesthetic."],
 ["roller","Double roller vs curtains","Layering costs roughly double","Sheer curtain + blockout is a common alternative, but it runs to roughly twice the cost of a double roller."],
 ["roller","Double roller vs curtains","Check the reveal depth","A double roller needs enough reveal depth &mdash; the brackets are bigger. Face-fitting one projects about 70&ndash;80mm into the room."],

 ["roller","Sizing","3,000mm max in a single blind","Limited by fabric width. Wider spans split into multiple blinds across the opening."],
 ["roller","Sizing","Beware a competitor&rsquo;s 4m claim","It&rsquo;s usually &lsquo;railroaded&rsquo; fabric &mdash; run sideways, against the weave. Stand at the side and you&rsquo;ll see the curve; it tends to curl."],

 ["roller","Motorisation","The real hurdle is us","Cost is the stated barrier, but the biggest reason customers don&rsquo;t motorise is that consultants never raise it. Australia lags Europe and the US on attachment."],
 ["roller","Motorisation","The reasons that sell it","Child safety &mdash; no chain at all. High ceilings, large or hard-to-reach windows, over stairways. Longevity &mdash; nothing touches the chain or fabric, so it lasts longer."],
 ["roller","Motorisation","What we offer","Rechargeable (battery, charged by USB) or hardwired; a wand option; and smart control with Alexa and Google Home."],
 ["roller","Motorisation","Be honest about battery life","Charge frequency depends on blind size, fabric weight and use &mdash; roughly once to four times a year. Competitors over-claim &ldquo;charge once a year&rdquo;. A 2.8m blockout depletes faster than a 1m blind. And don&rsquo;t leave it on charge overnight repeatedly &mdash; that shortens battery life."],

 ["roller","Service &amp; measuring","Most common service item","A broken chain. Cheaper, clunkier controls strain the chain &mdash; ours are smooth, and a chain is easy to swap."],
 ["roller","Service &amp; measuring","&ldquo;My motor isn&rsquo;t working&rdquo;","Usually an ageing lithium battery &mdash; they hold less charge after about 5&ndash;10 years &mdash; not a fault."],
 ["roller","Service &amp; measuring","Measuring pitfalls","Sliding-door handles, protruding mullions, bulkheads above doors, skirting or tiles at the bottom, sloping floors and bowing reveals &mdash; plus the wall material you&rsquo;re fixing into (gyprock limits where screws can go). Over-doors are trickier than over-windows."],

      ["Blades","Sizes","63 &middot; 89 &middot; 114&nbsp;mm &mdash; bigger blades let in more light when open, but need more reveal depth &amp; a bigger frame"],
      ["Frames","Z-frame","Best for reveals, out-of-square &amp; brick openings &mdash; hides gaps without siliconing, clean framed look"],
      ["Frames","L-frame","The most common frame &middot; usually siliconed / beaded to close light gaps"],
      ["Frames","Detail","T-post lines up with the window mullion &middot; stiles beaded or flat &middot; custom-widened stiles fit a bigger blade in a shallow reveal"],
      ["Configuration","Panels","Hinged (windows, the default) &middot; Bi-fold &amp; Sliding (Shutter - TRACKS, for door openings) &middot; corner bar &middot; fixed"],
      ["Configuration","Split tilt","The bottom can close for privacy while the top stays open for light &mdash; ask for it by name"],
      ["Configuration","Match the window","Panels meet on a mullion &mdash; never run a mullion through the middle of a panel"],
      ["Shaped &amp; skylight","Shapes","Arches, triangles, circles &amp; slopes &middot; skylight shutters use locks + a telescopic tilt rod"],
      ["Operation &amp; control","Tilt system","Clear-view tilt bar or hidden tilt (cleaner look) &middot; tension screws set the stiffness &middot; not motorised"],
      ["Structure","Mid rail","A solid, non-louvered support section &mdash; a drop over ~2,500&nbsp;mm needs one &middot; height can align to a door handle"],
      ["Energy &amp; safety","Insulation","Strong insulator &mdash; reflective white surface &middot; ~9% energy saving (indicative)"],
      ["Energy &amp; safety","Fire &amp; VOC","PVC is fire-retardant &mdash; can sit near a cooktop where a fabric blind can't &middot; very low VOC"],
      ["Finish","Colour","PE paint &middot; ~95% sold white / off-white (bright white stays cleanest) &middot; custom colours on a sample blade"],
      ["Warranty &amp; care","Warranty",'<span class="on">5 years manufacturing</span> &middot; 2 spare blades + touch-up paint supplied'],
      ["Warranty &amp; care","Care","One wipe per blade &middot; remove rings first &middot; tilt with two hands &middot; nip up the tilt-bar screws yearly"]
    ],
    wins:[["Longevity is the headline","A shutter lasts 2&ndash;3&times; a roller or Roman and adds resale value &mdash; sell it as an investment in the home, not a window covering."],["Own the quality story","Ours are post-painted after assembly, sprayed in a water-based booth, rabbet-jointed, and solid with an aluminium core &mdash; cheap 'poly resin' shutters are hollow, screwed-and-filled and painted before assembly. It only shows over years."],["Sell the concealed mechanism","A hidden tilt has no visible back bar &mdash; cleaner and longer-lasting. Most competitors can't offer it, so it wins the job even at a higher price."]],
    faqs:[["What's a plantation shutter?","A louvered timber or PVC panel on a solid frame and hinges &mdash; like a wooden Venetian. You tilt the blades for light and privacy, and swing the panels open like little doors."],["Are shutters blackout?","No &mdash; light seeps between the blades and around the panel, so they're excellent for privacy but not total darkness. For a dark bedroom, pair the shutter with a curtain in front."],["Which material for a bathroom or kitchen?","PVC, always &mdash; it won't swell or warp in the damp. Timber (hardwood or basswood) is lighter on the hinges everywhere else."],["Which blade size should I pick?","Bigger blades (up to 114&nbsp;mm) let in more light and view when open; smaller blades (63&nbsp;mm) suit a shallow reveal. It's part preference, part how much depth the window has."],["Can you do a skylight, arch or corner window?","Yes &mdash; shaped and skylight shutters are a real strength (skylights get a telescopic tilt rod), and corner windows use a corner bar."],["Will there be gaps or caulking?","Windows are rarely perfectly square, so out-of-square openings may need caulking, or a Z-frame that closes the light gaps &mdash; we'll set that expectation at measure so there are no surprises."]],
    objections:[["A local company quoted a cheaper 'thermal' PVC shutter.","Day one every shutter looks similar &mdash; the quality shows over years. Cheap 'poly resin' shutters are hollow (pinch a blade and it flexes) and have been seen to warp in a hot car; ours are solid and aluminium-reinforced, post-painted after assembly with rabbet joints. And a very long warranty is a red flag if the company may not outlast it &mdash; we back ours for 5 years and stock spare blades to fix anything fast."],["Won't aluminium be better in a hot, sunny room?","Actually no &mdash; aluminium retains heat and holds it as the sun moves off, and it makes a room echoey. A white timber or PVC shutter reflects heat far better; to really beat the heat, keep the shutter and stop the sun outside the glass with an external awning."]],
    tip:"Set expectations early on the three things that cause complaints &mdash; <b>light gaps, caulking and mid rails</b>. Shutters aren't blackout; if the room needs darkness, pair with a curtain and say so up front.",
    xsell:"For a dark bedroom, pair the shutter with a <b>blockout curtain</b> in front; for a hot room, add an <b>external awning</b> to stop the heat at the glass." },

      ["Heading","S-Wave vs S-Fold","Same look to the customer &mdash; S-Wave hooks slot into the tape (easy to adjust on site), S-Fold studs are fixed. S-Wave is now the default"],

      ["Fabric","Shape-holding","100% polyester holds the wave best &middot; blended / linen-look feels softer but can open out at the bottom &middot; a weighted hem helps"],
      ["Fabric","Sheer vs sunscreen","A sheer weave is not a sunscreen &mdash; for more night privacy without going blockout, step up to a denser / translucent sheer"],
      ["Track","Track is separate","The track is a separate line from the curtain &middot; single-piece up to ~5.7&ndash;6&nbsp;m avoids joins"],
      ["Track","Types","Residential track can be curved (bay / curved) &middot; Designer track cannot &middot; over max width, split + a track joiner and free-flow each"],
      ["Linings","Options","Blockout &middot; Light-filter &middot; Thermal &mdash; a sewn / shanked separate lining leaves an insulating air pocket &middot; Chic sheers can't take an attached lining (Urbane can)"],
      ["Sizing","Drop","Up to ~3&nbsp;m in one continuous length (no fabric join) &middot; length within the standard range doesn't change the price"],
      ["Limitations","Angled windows","No S-Wave on genuinely angled windows &mdash; an industry-wide limit; use a flatter, non-pleated design"],
      ["Warranty &amp; care","Warranty",'<span class="on">5 years</span> &mdash; the value Chic range is 3 years &middot; care label sewn into every curtain'],
      ["Warranty &amp; care","Care","Spot clean with a baby wipe or mild detergent &mdash; don't soak or machine wash (it shrinks / loses the trained shape)"]
    ],
    wins:[["Layer sheer + blockout","A sheer as the visible hero with a blockout (often motorised) behind is the upgrade most customers say yes to &mdash; softness by day, full control at night, no bulky look."],["Sell the drop","Floor-to-ceiling, wall-to-wall reads as luxury and makes the room feel taller &mdash; show photos so they can picture it, because hanging just above the frame is the most common regret."],["Own the fullness number","Tell them ours is 2.2 (220%) and ask what fullness the other quote uses &mdash; ~1.5 is a flatter, cheaper wave, and customers can see the difference."]],
    faqs:[["Does a shorter curtain cost less?","No &mdash; within our standard range a 1&nbsp;m and a 3&nbsp;m drop cost the same, because the fabric comes in set lengths and is folded to size. Only very long drops (beyond the roll) add cost."],["Why does one quote's wave look flatter?","Fullness &mdash; how much fabric is used across the window. Ours is 2.2 (220%); a cheaper quote around 1.5 (150%) gives a flat, stretched-sheet look. Ask any provider what fullness they're quoting."],["Will the wave hold its shape?","100% polyester holds the wave best; softer, lighter blends can open out at the bottom over time. We also hand-train and tie the wave after install &mdash; leave the ties in as long as you can, because the fabric learns the shape."],["Is the track included?","No &mdash; the track is quoted as a separate line from the curtain."],["Can I have a sheer and a blockout together?","Yes &mdash; a double track runs a sheer and a blockout, centre-opening or stacking to either side. It's the most popular set-up."],["Can you do a curved or angled window?","Curved / bay: yes, on a residential track. Genuinely angled windows: no S-Wave &mdash; nobody in the industry does it well, because a few millimetres of error breaks the angle."]],

/* ============ RENDER HELPERS ============ */
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}
/* A spec row is [label, value] or [group, label, value]. Values holding " · "-separated
   lists render as chips, which keeps long lists (chain colours, bracket types) readable. */
function specGroups(specs){
  const out=[];
  specs.forEach(e=>{
    const [g,l,v] = e.length>=3 ? e : ['', e[0], e[1]];
    let grp=out.find(x=>x.g===g);
    if(!grp){ grp={g,rows:[]}; out.push(grp); }
    grp.rows.push([l,v]);
  });
  return out;
}
function specValue(v){
  const parts=String(v).split(/\s*(?:&middot;|\u00B7)\s*/).filter(s=>s.trim());
  if(parts.length<2) return `<span class="val">${v}</span>`;
  return `<span class="val chips-v">${parts.map(p=>`<i>${p.trim()}</i>`).join('')}</span>`;
}
function specRows(specs){
  const groups=specGroups(specs);
  const body=groups.map((grp,i)=>{
    const rows=grp.rows.map(([l,v])=>`<div class="sr"><span class="lab">${l}</span>${specValue(v)}</div>`).join('');
    // ungrouped specs (a product whose sheet rows have no Group yet) just render flat
    if(!grp.g) return `<div class="a"><div class="sgrid">${rows}</div></div>`;
    return `<details><summary>${grp.g}</summary>
      <div class="a"><div class="sgrid">${rows}</div></div></details>`;
  }).join('');
  return `<div class="faq specs-faq">${body}</div>`;
}
function winRows(w){return w.map(([b,s])=>`<div class="w"><div><b>${b}</b><span>${s}</span></div></div>`).join('');}
function personaRows(p){return p.map(([t,who,d])=>`<div class="persona"><div class="pt">${t}<span class="who">${who}</span></div><div class="pd">${d}</div></div>`).join('');}
function faqRows(f){return f.map(([q,a])=>`<details><summary>${q}</summary><div class="a">${a}</div></details>`).join('');}
function objRows(o){return o.map(([q,a])=>`<div class="o"><div class="q">${q}</div><div class="aa">${a}</div></div>`).join('');}

e\" x=\"60\" y=\"42\" width=\"280\" height=\"9\" rx=\"2\"/>\n      <text class=\"t ok\" x=\"150\" y=\"205\">minimal gap</text>\n      <!-- overlap arrows -->\n      <path class=\"dimline\" d=\"M60 222 H90\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n      <path class=\"dimline\" d=\"M310 222 H340\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n      <text class=\"t dim\" x=\"52\" y=\"238\">overlap</text>\n      <text class=\"t dim\" x=\"298\" y=\"238\">overlap</text>\n      <text class=\"t\" x=\"140\" y=\"130\" style=\"font-weight:700\">Blind over the face</text>\n      <text class=\"t sm\" x=\"30\" y=\"18\" style=\"fill:var(--sage-deep)\">Face fit</text>\n    </svg>\n  </div>\n  <div class=\"note\"><b>Much less light on a face fit</b> &mdash; the fabric runs wider and covers the opening edges, though it still sits a\n    little off the wall so a faint glow remains. The choice when the customer wants a dark room, or the window is out of square.</div>"}, {"t": "Measure in three places &mdash; take the smallest", "h": "<svg viewBox=\"0 0 620 280\" role=\"img\" aria-label=\"Three width measurements and three drop measurements on a tapered opening\">\n    <rect class=\"wall\" x=\"30\" y=\"20\" width=\"560\" height=\"240\"/>\n    <!-- deliberately tapered opening: narrower at the top -->\n    <path class=\"glass\" d=\"M150 55 L470 55 L482 225 L138 225 Z\"/>\n    <path class=\"edge\" d=\"M150 55 L470 55 L482 225 L138 225 Z\"/>\n    <!-- three widths -->\n    <path class=\"dimline\" d=\"M150 72 H470\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <path class=\"dimline\" d=\"M144 140 H476\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <path class=\"dimline\" d=\"M138 210 H482\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <rect x=\"272\" y=\"62\" width=\"76\" height=\"17\" rx=\"3\" fill=\"var(--paper)\" stroke=\"var(--line)\"/>\n    <text class=\"t dim\" x=\"282\" y=\"75\">1196 mm</text>\n    <rect x=\"272\" y=\"130\" width=\"76\" height=\"17\" rx=\"3\" fill=\"var(--paper)\" stroke=\"var(--line)\"/>\n    <text class=\"t dim\" x=\"282\" y=\"143\">1204 mm</text>\n    <rect x=\"272\" y=\"200\" width=\"76\" height=\"17\" rx=\"3\" fill=\"var(--paper)\" stroke=\"var(--line)\"/>\n    <text class=\"t dim\" x=\"282\" y=\"213\">1212 mm</text>\n    <!-- callout -->\n    <path class=\"guide\" d=\"M352 70 H540\"/>\n    <text class=\"t ok\" x=\"500\" y=\"66\">smallest</text>\n    <text class=\"t sm\" x=\"30\" y=\"272\">Order to 1196 mm &mdash; not the average, not the widest</text>\n  </svg>\n  <div class=\"note\"><b>Take the smallest, never the average.</b> A blind cut to the average will bind at the narrow point\n    and will not go up and down.</div>"}, {"t": "The two diagonals", "h": "<div class=\"two\">\n    <svg viewBox=\"0 0 400 260\" role=\"img\" aria-label=\"Square opening: both diagonals equal\">\n      <rect class=\"wall\" x=\"20\" y=\"20\" width=\"360\" height=\"220\"/>\n      <rect class=\"glass\" x=\"80\" y=\"55\" width=\"240\" height=\"150\"/>\n      <rect class=\"edge\" x=\"80\" y=\"55\" width=\"240\" height=\"150\"/>\n      <path class=\"dimline\" d=\"M80 205 L320 55\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n      <path class=\"dimline\" d=\"M80 55 L320 205\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n      <rect x=\"160\" y=\"120\" width=\"82\" height=\"18\" rx=\"3\" fill=\"var(--paper)\" stroke=\"var(--line)\"/>\n      <text class=\"t dim\" x=\"168\" y=\"133\">1921 = 1921</text>\n      <text class=\"t ok\" x=\"80\" y=\"235\">Square &mdash; safe to reveal-fit</text>\n    </svg>\n    <svg viewBox=\"0 0 400 260\" role=\"img\" aria-label=\"Racked opening: diagonals differ, light gap wedge down one side\">\n      <rect class=\"wall\" x=\"20\" y=\"20\" width=\"360\" height=\"220\"/>\n      <!-- racked (sheared) opening -->\n      <path class=\"glass\" d=\"M96 55 L336 55 L304 205 L64 205 Z\"/>\n      <path class=\"edge\" d=\"M96 55 L336 55 L304 205 arker-end=\"url(#dgA)\"/>\n    <text class=\"t dim\" x=\"268\" y=\"228\">opening 1200</text>\n    <path class=\"dimline\" d=\"M130 214 H190\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <text class=\"t dim\" x=\"134\" y=\"228\">+60</text>\n    <path class=\"dimline\" d=\"M430 214 H490\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <text class=\"t dim\" x=\"440\" y=\"228\">+60</text>\n    <path class=\"dimline\" d=\"M130 40 H490\" marker-start=\"url(#dgB)\" marker-end=\"url(#dgA)\"/>\n    <rect x=\"262\" y=\"28\" width=\"112\" height=\"18\" rx=\"3\" fill=\"var(--paper)\" stroke=\"var(--line)\"/>\n    <text class=\"t dim\" x=\"270\" y=\"41\">order 1320 mm</text>\n    <path class=\"guide\" d=\"M130 46 V62 M490 46 V62\"/>\n  </svg>\n  <div class=\"note\"><b>Check the wall before you promise the overlap.</b> A light switch, a corner, an adjacent architrave or a\n    window winder will all steal the space you just measured.</div>"}], "Size limits": [{"t": "Minimum width depends on the control", "h": "<svg viewBox=\"0 0 620 200\" role=\"img\" aria-label=\"Minimum widths: chain 250mm, rechargeable motor 575mm, RTS motor 680mm\">\n    <rect x=\"0\" y=\"0\" width=\"620\" height=\"200\" fill=\"none\"/>\n    <line class=\"edge\" x1=\"60\" y1=\"150\" x2=\"580\" y2=\"150\"/>\n    <!-- scale marks -->\n    <g>\n      <rect class=\"blind\" x=\"60\" y=\"105\" width=\"52\" height=\"45\"/>\n      <text class=\"t dim\" x=\"60\" y=\"98\">250</text>\n      <text class=\"t sm\" x=\"60\" y=\"168\">Chain</text>\n    </g>\n    <g>\n      <rect class=\"blind\" x=\"150\" y=\"85\" width=\"120\" height=\"65\"/>\n      <text class=\"t dim\" x=\"150\" y=\"78\">575</text>\n      <text class=\"t sm\" x=\"150\" y=\"168\">Rechargeable motor</text>\n    </g>\n    <g>\n      <rect class=\"blind\" x=\"310\" y=\"70\" width=\"142\" height=\"80\"/>\n      <text class=\"t dim\" x=\"310\" y=\"63\">680</text>\n      <text class=\"t sm\" x=\"310\" y=\"168\">RTS motor</text>\n    </g>\n    <text class=\"t no\" x=\"490\" y=\"100\">A 400 mm window?</text>\n    <text class=\"t no\" x=\"490\" y=\"118\">Chain only.</text>\n  </svg>"}], "Re-make traps": [{"t": "What steals your opening", "h": "<svg viewBox=\"0 0 620 260\" role=\"img\" aria-label=\"Common obstructions: bulkhead, door handle, mullion, skirting and tiles\">\n    <rect class=\"wall\" x=\"20\" y=\"20\" width=\"580\" height=\"220\"/>\n    <!-- bulkhead -->\n    <rect x=\"90\" y=\"45\" width=\"440\" height=\"26\" fill=\"#E3DED0\" stroke=\"var(--ink)\" stroke-width=\"1.2\"/>\n    <text class=\"t\" x=\"98\" y=\"63\" style=\"font-weight:700\">Bulkhead &mdash; no headroom for the bracket</text>\n    <!-- opening -->\n    <rect class=\"glass\" x=\"90\" y=\"71\" width=\"440\" height=\"130\"/>\n    <rect class=\"edge\" x=\"90\" y=\"71\" width=\"440\" height=\"130\"/>\n    <!-- mullion -->\n    <rect x=\"300\" y=\"71\" width=\"16\" height=\"130\" fill=\"#E3DED0\" stroke=\"var(--ink)\" stroke-width=\"1.2\"/>\n    <text class=\"t sm\" x=\"256\" y=\"96\" style=\"fill:var(--bad)\">Mullion</text>\n    <!-- handle -->\n    <circle cx=\"245\" cy=\"140\" r=\"9\" fill=\"var(--olive)\"/>\n    <rect x=\"238\" y=\"136\" width=\"30\" height=\"8\" rx=\"3\" fill=\"var(--olive)\"/>\n    <text class=\"t sm\" x=\"196\" y=\"166\" style=\"fill:var(--bad)\">Handle</text>\n    <!-- winder -->\n    <circle cx=\"470\" cy=\"172\" r=\"7\" fill=\"var(--olive)\"/>\n    <text class=\"t sm\" x=\"442\" y=\"194\" style=\"fill:var(--bad)\">Winder</text>\n    <!-- skirting + tiles -->\n    <rect x=\"20\" y=\"201\" width=\"580\" height=\"16\" fill=\"#E3DED0\" stroke=\"var(--ink)\" stroke-width=\"1.2\"/>\n    <text class=\"t\" x=\"30\" y=\"232\" style=\"font-weight:700\">Skirting / tiles &mdash; the bottom rail will land on them</text>\n  </svg>\n  <div class=\"note\">If any of these are in the opening, the answer is usually <b>face fit</b> &mdash; mount clear of the\n    obstruction rather than fighting it.</div>"}], "Fit for darkness": [{"t": "Double roller &mdash; which one goes in front", "h": "<svg viewBox=\"0 0 620 230\" role=\"img\" aria-label=\"Double roller: sunscreen at the back, blockout at the front hides the roll\">\n    <rect x=\"0\" y=\"0\" width=\"620\" height=\"230\" fill=\"none\"/>\n    <rect class=\"glass\" x=\"60\" y=\"30\" width=\"14\" height=\"170\"/>\n    <text class=\"t sm\" x=\"46\" y=\"218\">Glass</text>\n    <!-- back roller: sunscreen -->\n    <circle cx=\"130\" cy=\"60\" r=\"20\" fill=\"none\" stroke=\"var(--sage-deep)\" stroke-width=\"2\"/>\n    <path d=\"M110 60 L110 190\" stroke=\"var(--sage-deep)\" stroke-width=\"3.5\"/>\n    <text class=\"t\" x=\"130\" y=\"120\" style=\"font-weight:700;fill:var(--sage-deep)\">Sunscreen</text>\n    <text class=\"t sm\" x=\"130\" y=\"136\">back &middot; down by day</text>\n    <!-- front roller: blockout, rolled UP, sits higher and in front -->\n    <circle cx=\"196\" cy=\"52\" r=\"24\" fill=\"none\" stroke=\"var(--olive)\" stroke-width=\"2.4\"/>\n    <circle cx=\"196\" cy=\"52\" r=\"7\" fill=\"var(--olive)\"/>\n    <text class=\"t\" x=\"240\" y=\"46\" style=\"font-weight:700\">Blockout, rolled up</text>\n    <text class=\"t sm\" x=\"240\" y=\"62\">front &middot; sits above and in front</text>\n    <path class=\"guide\" d=\"M196 76 V190\"/>\n    <path class=\"dimline\" d=\"M232 52 H196\" marker-end=\"url(#dgA)\"/>\n    <text class=\"t ok\" x=\"240\" y=\"96\">hides the sunscreen roll</text>\n    <text class=\"t sm\" x=\"400\" y=\"150\">~99% of orders</text>\n    <text class=\"t sm\" x=\"400\" y=\"168\">are this way round</text>\n  </svg>"}]};
function diagramsFor(section){
  const list=DIAGRAMS[String(section).trim()];
  if(!list) return '';
  return list.map(d=>`<figure class="dg"><figcaption class="dgcap">${d.t}</figcaption>${d.h}</figure>`).join('');
}
const isMeasuring = sec => /^measuring/i.test(String(sec).trim());

/* ---- Measure check ------------------------------------------------------
   Two INDEPENDENT tests from width, drop and both diagonals:
     numbers:  |avg(D1,D2) - sqrt(w^2+d^2)|   -> did the rep write the numbers down right?
     window:   (D1^2 - D2^2) / (4w)           -> is the recess actually square?
   Averaging the diagonals cancels the racking, so a crooked window never gets
   misreported as a bad measurement (and vice versa).
   It CANNOT detect a transposed width/drop - sqrt(w^2+d^2) is symmetric. Said so in the UI. */
const MEASURE_TOL_MM = 3;
function measureCheckHTML(){
  return `<div class="mcheck" data-fit="reveal">
    <div class="mchead"><span class="label">Measure check</span>
      <span class="small muted">Tolerance ${MEASURE_TOL_MM}&nbsp;mm</span></div>
    <p class="small muted" style="margin:8px 0 14px;max-width:72ch">Measure the <b>opening</b> &mdash; width, drop and
      <b>both</b> diagonals. This tells you two separate things: whether your numbers add up, and whether the window is square.</p>
    <div class="mcfit chips" data-fit>
      <button type="button" data-v="reveal" aria-pressed="true">Reveal fit</button>
      <button type="button" data-v="face" aria-pressed="false">Face fit</button>
    </div>
    <div class="mcgrid">
      <label>Width<input type="number" inputmode="decimal" class="mc-w" placeholder="mm"></label>
      <label>Drop<input type="number" inputmode="decimal" class="mc-d" placeholder="mm"></label>
      <label>Diagonal 1<input type="number" inputmode="decimal" class="mc-d1" placeholder="mm"></label>
      <label>Diagonal 2<input type="number" inputmode="decimal" class="mc-d2" placeholder="mm"></label>
      <label class="mc-face-only" hidden>Overlap each side<input type="number" inputmode="decimal" class="mc-ol" placeholder="mm"></label>
    </div>
    <div class="mc-hint" hidden></div>
    <div class="mcactions">
      <button type="button" class="btn mc-go">Check it</button>
      <button type="button" class="btn ghost mc-reset">Clear</button>
    </div>
    <div class="mc-result"></div>
    <p class="mc-caveat"><b>This cannot catch a transposed width and drop</b> &mdash; the maths is identical either way round.
      Always take width first, then drop.</p>
  </div>`;
}
/* Live prediction as the rep types the width and drop. Shown BELOW the fields, never inside
   them: a number sitting in the box you are about to type into invites you to copy it, and a
   copied diagonal verifies nothing. Worded to be tested, not trusted. */
function updateMeasureHint(box){
  const num=s=>{const v=parseFloat((box.querySelector(s)||{}).value);return isFinite(v)&&v>0?v:null;};
  const w=num('.mc-w'), d=num('.mc-d');
  const hint=box.querySelector('.mc-hint');
  if(!hint) return;
  if(!w||!d){ hint.hidden=true; hint.innerHTML=''; return; }
  const expected=Math.sqrt(w*w+d*d);
  hint.hidden=false;
  hint.innerHTML=`If this recess is square, the diagonal should be about
    <b>${expected.toFixed(0)}&nbsp;mm</b> <span class="mc-hint-note">&mdash; measure it anyway.
    If your tape disagrees, trust the tape and enter what you actually measured.</span>`;
}
function runMeasureCheck(box){
  const num=s=>{const v=parseFloat((box.querySelector(s)||{}).value);return isFinite(v)&&v>0?v:null;};
  const w=num('.mc-w'), d=num('.mc-d'), d1=num('.mc-d1'), d2=num('.mc-d2');
  const res=box.querySelector('.mc-result');
  if(!w||!d||!d1){
    res.innerHTML='<div class="mres warn">Enter the width, the drop and at least one diagonal.</div>';
    return;
  }
  const face = box.dataset.fit==='face';
  const ol = num('.mc-ol');
  const expected=Math.sqrt(w*w+d*d), out=[];
  if(d2){
    const dmean=(d1+d2)/2;
    const consistency=Math.abs(dmean-expected);
    const racking=Math.abs((d1*d1-d2*d2)/(4*w));
    out.push(consistency<=MEASURE_TOL_MM
      ? `<div class="mres ok"><b>Numbers add up.</b> For ${w}&nbsp;&times;&nbsp;${d} the diagonal should be about
         ${expected.toFixed(0)}&nbsp;mm &mdash; you measured ${dmean.toFixed(0)}&nbsp;mm on average, ${consistency.toFixed(1)}&nbsp;mm out.</div>`
      : `<div class="mres bad"><b>These don&rsquo;t add up &mdash; re-check the width and drop.</b> For ${w}&nbsp;&times;&nbsp;${d}
         the diagonal should be about ${expected.toFixed(0)}&nbsp;mm, but you measured ${dmean.toFixed(0)}&nbsp;mm &mdash;
         <b>${consistency.toFixed(0)}&nbsp;mm out</b>. Look for a dropped digit, or mm read as cm.</div>`);

    if(!face){
      out.push(racking<=MEASURE_TOL_MM
        ? `<div class="mres ok"><b>Window is square.</b> The diagonals differ by ${Math.abs(d1-d2).toFixed(1)}&nbsp;mm
           (${racking.toFixed(1)}&nbsp;mm out) &mdash; inside the ${MEASURE_TOL_MM}&nbsp;mm tolerance. Safe to reveal-fit.</div>`
        : `<div class="mres warn"><b>Window is ${racking.toFixed(0)}&nbsp;mm out of square.</b> Say it to the customer now, not after
           install: the blind is a rigid rectangle, so expect a light gap tapering to about <b>${racking.toFixed(0)}&nbsp;mm</b> down one
           side. If that won&rsquo;t fly, face-fit it with a pelmet &mdash; that hides it completely.</div>`);
      out.push(`<div class="mres ok"><b>Reveal fit &mdash; don&rsquo;t deduct twice.</b> The factory takes the 2&nbsp;mm recess
        deduction. Give them the true opening: <b>${w}&nbsp;&times;&nbsp;${d}&nbsp;mm</b>.</div>`);
    } else {
      // Face fit hides the LIGHT GAP, but not the VISUAL misalignment - the blind hangs level, the window doesn't.
      out.push(racking<=MEASURE_TOL_MM
        ? `<div class="mres ok"><b>Window is square</b> (${racking.toFixed(1)}&nbsp;mm out). Nothing to disguise.</div>`
        : `<div class="mres warn"><b>Window is ${racking.toFixed(0)}&nbsp;mm out of square &mdash; but you&rsquo;re face-fitting, so the
           light gap is not the problem.</b> The blind will hang level while the window doesn&rsquo;t, so it can look slightly out of
           parallel with the architrave. More overlap, or a pelmet, hides it.</div>`);
      if(ol){
        out.push(`<div class="mres ok"><b>Order width &asymp; ${(w+2*ol).toFixed(0)}&nbsp;mm</b> &mdash; ${w} opening + ${ol}&nbsp;mm
          overlap each side. Check there is clear, flat wall for the brackets at that width: no light switch, corner, adjacent
          architrave or window winder in the way.</div>`);
      }
      out.push(`<div class="mres warn"><b>Face fit &mdash; check before you leave.</b> Is there headroom above the opening for the
        bracket (cornice, bulkhead)? Is the mounting surface flat and plumb? And what are you fixing into &mdash; gyprock limits
        where a screw can land.</div>`);
    }
  } else {
    const gap=Math.abs(d1-expected);
    out.push(gap<=MEASURE_TOL_MM
      ? `<div class="mres ok"><b>Numbers look right.</b> Expected ${expected.toFixed(0)}&nbsp;mm, you measured ${d1.toFixed(0)}&nbsp;mm.
         Measure the second diagonal to also confirm the window is square.</div>`
      : `<div class="mres warn"><b>${gap.toFixed(0)}&nbsp;mm out &mdash; but one diagonal can&rsquo;t tell you why.</b> Either the width
         and drop are wrong, <i>or</i> the window isn&rsquo;t square. <b>Measure the second diagonal</b> and run it again &mdash; that
         separates the two.</div>`);
  }
  res.innerHTML=out.join('');
}
function measuringFor(id){
  const head=`<div class="sectlead" style="margin-top:34px"><h3 class="display">Measure it right</h3><div class="rule"></div></div>`;
  const rows=KNOWLEDGE.filter(k=>k[0]===id && isMeasuring(k[1]));
  if(!rows.length){
    return head+
      `<div class="measure-empty"><b>Product-specific guidance not documented yet.</b> The deductions and size limits for
      ${PRODUCTS[id].name} need its spec sheet before they go in here &mdash; left blank rather than guessed at, because a wrong
      measuring rule causes the re-makes it is meant to prevent. The check below is pure geometry, so it works on any recess.</div>`
      + measureCheckHTML();
  }
  const groups=[];
  rows.forEach(r=>{
    const name=String(r[1]).split(/\s*(?:&middot;|\u00B7)\s*/).slice(1).join(' ')||'General';
    let grp=groups.find(o=>o.name===name);
    if(!grp){ grp={name,items:[]}; groups.push(grp); }
    grp.items.push([r[2],r[3]]);
  });
  const blocks=groups.map((grp,i)=>`<details><summary>${grp.name}</summary>
    <div class="a"><ul class="kn">${grp.items.map(([k,d])=>`<li><b>${k}</b><span>${d}</span></li>`).join('')}</ul>
    ${diagramsFor(grp.name)}</div></details>`).join('');
  return head+
    `<p class="small muted" style="margin:12px 0 0;max-width:74ch">Run this at the window. Most measuring failures are
      clerical, not technical &mdash; and a re-make costs the margin on the job and the customer&rsquo;s patience.</p>`
    + `<div class="faq" style="margin-top:18px">${blocks}</div>`
    + measureCheckHTML();
}
function knowledgeFor(id){
  const rows=KNOWLEDGE.filter(k=>k[0]===id && !isMeasuring(k[1]));
  if(!rows.length) return '';
  const sections=[];
  rows.forEach(([,s,k,d])=>{let g=sections.find(x=>x.s===s);if(!g){g={s,items:[]};sections.push(g);}g.items.push([k,d]);});
  const blocks=sections.map((g,i)=>`<details><summary>${g.s}</summary>
    <div class="a"><ul class="kn">${g.items.map(([k,d])=>`<li><b>${k}</b><span>${d}</span></li>`).join('')}</ul>
    ${diagramsFor(g.s)}</div></details>`).join('');
  return `<div class="sectlead" style="margin-top:34px"><h3 class="display">Product knowledge</h3><div class="rule"></div></div>
    <p class="small muted" style="margin:12px 0 0;max-width:72ch">The depth behind the pitch &mdash; from the product-knowledge session. Use it to answer what the customer actually asks, and to hold the value line against DIY and cut-price competitors.</p>
    <div class="faq" style="margin-top:16px">${blocks}</div>`;
}

/* A colour is either "name" (available) or ["name", 0] (unavailable). Sorted A-Z. */
function normColours(list){
  return list.map(c=>Array.isArray(c)?{n:String(c[0]),ok:c[1]!==0&&c[1]!=='0'}:{n:String(c),ok:true})
             .sort((a,b)=>a.n.localeCompare(b.n,undefined,{sensitivity:'base'}));
}
function colourRow(name, cols){
  const list=normColours(cols);
  if(!list.length) return `<tr class="colrow" hidden><td colspan="5"><div class="swatches empty">No colours listed for ${name} yet &mdash; add them to the <b>Colours</b> tab of the sheet.</div></td></tr>`;
  const off=list.filter(c=>!c.ok).length;
  return `<tr class="colrow" hidden><td colspan="5">
    <div class="swhead">${list.length} colours${off?` <span class="offnote">&middot; ${off} unavailable</span>`:''}</div>
    <ul class="swlist">${list.map(c=>`<li class="sw${c.ok?'':' off'}"><span>${c.n}</span>${c.ok?'':'<em>unavailable</em>'}</li>`).join('')}</ul>
  </td></tr>`;
}
function rangeGridFor(key){
  if(key==='honeycomb'){
    let rows='', tier='';
    HONEYCOMB.forEach(h=>{
      if(h.tier!==tier){tier=h.tier;const cap={'Single cell':'Single cell &middot; everyday insulation','Double cell':'Double cell &middot; better insulation','Cell-in-cell':'Cell-in-cell &middot; top insulation'}[tier];rows+=`<tr class="grouprow"><td colspan="5">${cap}</td></tr>`;}
      const hoff = h.avail===0;
      rows+=`<tr class="rrow${hoff?' off':''}" data-range="${h.name}" role="button" tabindex="0" aria-expanded="false">

      rows+=colourRow(h.name, coloursFor(h.name));
    });

  const rows = list.sort((a,b)=>(b.roller+b.roman+b.panel+b.vertical)-(a.roller+a.roman+a.panel+a.vertical)||b.shades-a.shades).map(r=>{

    const tbc = (r.roman===-1)?' <span class="flag">?</span>':'';
    const off = r.avail===0;
    return `<tr class="rrow${off?' off':''}" data-range="${r.name}" role="button" tabindex="0" aria-expanded="false">

  }).join('');
  return `<div class="table-scroll"><table class="matrix num"><thead><tr><th>Range</th><th class="opt">Type &middot; style</th><th class="c">Shades</th><th class="opt">Also available as</th><th class="c">Colours</th></tr></thead><tbody>${rows}</tbody></table></div>`;

function lbFiltered(){
  const now=new Date();
  return SALES.filter(r=>{
    if(lbState.product!=="All" && r[3]!==lbState.product) return false;
    if(lbState.state!=="All" && r[2]!==lbState.state) return false;
    if(lbState.period!=="All"){
      const days=lbState.period==="30 days"?30:90, dt=new Date(r[0]);

function byRep(rows){
  const m={};
  rows.forEach(r=>{const rep=r[1];if(!m[rep])m[rep]={rep,state:r[2],units:0};m[rep].units+=Number(r[5])||0;});
  return Object.values(m).sort((a,b)=>b.units-a.units||a.rep.localeCompare(b.rep));
}
function tally(rows,i){
  const m={}; rows.forEach(r=>{m[r[i]]=(m[r[i]]||0)+(Number(r[5])||0);});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

/* ============ LIVE DATA (Google Sheet) ============ */
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===',') { row.push(cur); cur=''; }
    else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else if(c!=='\r') cur+=c;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function asObjects(rows){
  if(!rows.length) return [];
  const H=rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.some(c=>c.trim()!=='')).map(r=>{const o={};H.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
}
function g(o,key){key=key.toLowerCase();for(const k in o){if(k.toLowerCase().startsWith(key))return o[k];}return '';}
const yn=s=>{s=(s||'').trim().toLowerCase();return s.startsWith('y')?1:(s.startsWith('?')?-1:0);};
/* Availability: blank means available. Only an explicit "N" marks something as unavailable. */
const availOf=s=>String(s||'').trim().toLowerCase().startsWith('n')?0:1;
function lightKeys(type){const t=(type||'').toLowerCase(),l=[];if(t.includes('sunscreen'))l.push('sunscreen');if(t.includes('blockout'))l.push('blockout');if(t.includes('light'))l.push('lightfilter');return l.length?l:['blockout'];}

function applyProducts(o){const id=g(o,'product id');const P=PRODUCTS[id];if(!P)return;
  P.name=g(o,'display name')||P.name; P.idx=g(o,'section label')||P.idx; P.pos=g(o,'positioning')||P.pos;
  const bf=g(o,'best for'); if(bf)P.bestFor=bf.split('|').map(s=>s.trim()).filter(Boolean);
  const tip=g(o,'consultant tip'); if(tip)P.tip=tip;
  const xs=g(o,'cross'); if(xs)P.xsell=xs;
  const im=g(o,'image'); if(im!=='') P.img=im;}
function grouped(objs,reset,push){const seen={};objs.forEach(o=>{const id=g(o,'product id');if(!PRODUCTS[id])return;if(!seen[id]){reset(id);seen[id]=1;}push(id,o);});}
function applyData(sheets){
  if(sheets.Products) asObjects(sheets.Products).forEach(applyProducts);
  if(sheets.Specs) grouped(asObjects(sheets.Specs),id=>PRODUCTS[id].specs=[],(id,o)=>{
    let v=g(o,'value'); const hl=g(o,'highlight').toUpperCase().startsWith('Y');
    if(/insyte|tbc|\u27E8/i.test(v)) v='<span class="fill">'+v+'</span>'; else if(hl) v='<span class="on">'+v+'</span>';
    const grp=g(o,'group');
    PRODUCTS[id].specs.push(grp?[grp,g(o,'spec'),v]:[g(o,'spec'),v]);});
  if(sheets.FAQ) grouped(asObjects(sheets.FAQ),id=>PRODUCTS[id].faqs=[],(id,o)=>PRODUCTS[id].faqs.push([g(o,'question'),g(o,'answer')]));
  if(sheets.Wins) grouped(asObjects(sheets.Wins),id=>PRODUCTS[id].wins=[],(id,o)=>PRODUCTS[id].wins.push([g(o,'headline'),g(o,'detail')]));
  if(sheets.Personas) grouped(asObjects(sheets.Personas),id=>PRODUCTS[id].personas=[],(id,o)=>PRODUCTS[id].personas.push([g(o,'fabric'),g(o,'best for'),g(o,'description')]));
  if(sheets.Objections) grouped(asObjects(sheets.Objections),id=>PRODUCTS[id].objections=[],(id,o)=>PRODUCTS[id].objections.push([g(o,'objection'),g(o,'response')]));
  if(sheets.Colours){const out={};
    asObjects(sheets.Colours).forEach(o=>{const r=g(o,'range'),c=g(o,'colour')||g(o,'color');
      if(!r||!c)return; (out[r]=out[r]||[]).push([c, availOf(g(o,'available'))]);});
    if(Object.keys(out).length){COLOURS=out;COLOUR_INDEX=null;}}
  if(sheets.Sales){const out=asObjects(sheets.Sales)
    .filter(o=>g(o,'rep'))
    .map(o=>[g(o,'date'),g(o,'rep'),g(o,'state'),g(o,'product').toLowerCase(),g(o,'range'),Number(g(o,'units'))||0,Number(String(g(o,'value')).replace(/[^0-9.]/g,''))||0]);
    if(out.length){SALES=out;SALES_IS_SAMPLE=false;lbState.range="All";lbState.product="All";lbState.state="All";lbState.period="All";}}
  if(sheets.Knowledge){const out=asObjects(sheets.Knowledge)
    .filter(o=>g(o,'product id')&&g(o,'point'))
    .map(o=>[g(o,'product id'),g(o,'section'),g(o,'point'),g(o,'detail')]);
    if(out.length)KNOWLEDGE=out;}
  if(sheets.RollerFabrics){const out=asObjects(sheets.RollerFabrics).filter(o=>g(o,'range')).map(o=>({
    name:g(o,'range'),type:g(o,'type'),style:g(o,'style'),roller:yn(g(o,'roller')),roman:yn(g(o,'roman')),
    panel:yn(g(o,'panel')),vertical:yn(g(o,'vertical')),shades:Number(g(o,'shades'))||g(o,'shades'),light:lightKeys(g(o,'type')),note:g(o,'note'),
    avail:availOf(g(o,'available'))}));
    if(out.length)RANGES=out;}
  if(sheets.Honeycomb){const out=asObjects(sheets.Honeycomb).filter(o=>g(o,'range')).map(o=>({
    tier:g(o,'cell type'),name:g(o,'range'),size:g(o,'cell size'),opacity:g(o,'opacity'),shades:Number(g(o,'shades'))||g(o,'shades'),note:g(o,'note'),
    avail:availOf(g(o,'available'))}));
    if(out.length)HONEYCOMB=out;}
  if(sheets.Images){const out=asObjects(sheets.Images)
    .filter(o=>g(o,'image')||g(o,'src'))
    .map(o=>({src:g(o,'image')||g(o,'src'),product:g(o,'product').toLowerCase(),window:g(o,'window'),
      type:g(o,'type')||g(o,'light'),range:g(o,'range'),
      tags:g(o,'tag').split('|').map(s=>s.trim()).filter(Boolean),caption:g(o,'caption')}));
    if(out.length)IMAGES=out;}
  if(sheets.Workwear){const out=asObjects(sheets.Workwear)
    .filter(o=>g(o,'code')&&g(o,'name'))
    .map(o=>({cat:g(o,'category')||'Team Kit',name:g(o,'name'),code:g(o,'code'),
      price:Number(String(g(o,'price')).replace(/[^0-9.]/g,''))||0,
      sizes:(g(o,'sizes')||'').split(/[|,]/).map(s=>s.trim()).filter(Boolean),
      colours:((g(o,'colours')||g(o,'colour')||'Black').split(/[|,]/).map(s=>s.trim()).filter(Boolean)),
      pocket:Number(String(g(o,'pocket')).replace(/[^0-9.]/g,''))||0,
      shape:(g(o,'shape')||'polo').trim(),
      popular:/^y/i.test(g(o,'popular')),hv:/^y/i.test(g(o,'hi-vis')||g(o,'hivis')),
      best:/^y/i.test(g(o,'best')),img:g(o,'image')||''}))
    .filter(w=>w.sizes.length);
    if(out.length)WORKWEAR=out;}
  if(sheets.Playbook){const out=asObjects(sheets.Playbook)
    .filter(o=>g(o,'question')&&g(o,'answer'))
    .map(o=>({c:g(o,'category')||'General',q:g(o,'question'),a:g(o,'answer'),t:g(o,'type'),f:g(o,'frequency')}));
    if(out.length)PLAYBOOK=out;}
}
async function loadFromSheet(){
  if(!SHEET_ID) return false;
  const base=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;
  const sheets={};
  await Promise.all(SHEET_TABS.map(async name=>{
    try{const r=await fetch(base+encodeURIComponent(name));if(r.ok)sheets[name]=parseCSV(await r.text());}catch(e){}
  }));
  if(!Object.keys(sheets).length) return false;
  applyData(sheets);
  return true;
}

  else {s.textContent='\u25CB Using built-in data (no sheet connected yet)';s.style.color='var(--muted)';}
}

function readWorkwearOrder(){
  const lines=[]; let subtotal=0;
  document.querySelectorAll('#panel-workwear .ww-card').forEach(card=>{
    const qty=parseInt(card.querySelector('.ww-qty').value,10)||0;
    card.classList.toggle('on',qty>0);
    if(qty<=0) return;
    const price=parseFloat(card.dataset.price)||0;
    const pocketP=parseFloat(card.dataset.pocket)||0;
    const size=card.querySelector('.ww-size').value;
    const colour=card.querySelector('.ww-colour').value;
    const addName=card.querySelector('.ww-name').checked;
    const pk=card.querySelector('.ww-pocket');
    const addPocket=pk?pk.checked:false;
    const emb=addName?(WORKWEAR_LAUNCH_FREE_NAME?0:6.5):0;
    const pocket=addPocket?pocketP:0;
    const lineTotal=(price+emb+pocket)*qty;
    subtotal+=lineTotal;
    lines.push({code:card.dataset.code,label:card.dataset.name,size,colour,qty,addName,addPocket,unit:price,lineTotal});
  });
  const credit=Math.min(WORKWEAR_CREDIT,subtotal);
  return {lines,subtotal,credit,pay:Math.max(0,subtotal-credit)};
}
function updateWorkwearSummary(){
  const box=document.getElementById('ww-summary'); if(!box) return;
  const o=readWorkwearOrder();
  const lines=o.lines.length?o.lines.map(l=>{
    const meta=[l.size,(l.colour&&l.colour!=='—')?l.colour:null,l.addName?'+name':null,l.addPocket?'+pocket':null].filter(Boolean).join(' &middot; ');
    return `<div class="l"><span>${l.qty}&times; ${l.label} <span class="muted">${meta}</span></span><span class="amt">${wwMoney(l.lineTotal)}</span></div>`;
  }).join(''):`<div class="ww-empty">No items yet &mdash; set a quantity on the pieces you want above.</div>`;
  box.innerHTML=`<div class="card ww-sumcard">
    <h4 class="mini">Your kit</h4>

    <div class="ww-tot"><span>Subtotal</span><span>${wwMoney(o.subtotal)} +gst</span></div>
    <div class="ww-tot credit"><span>Your $100 credit</span><span>&minus;${wwMoney(o.credit)}</span></div>
    <div class="ww-tot pay"><span>You pay</span><span class="amt">${wwMoney(o.pay)} +gst</span></div>

    <div class="ww-note">Every piece includes the company logo (left chest). Prices exclude GST. Your order goes to the workwear team and you&rsquo;ll get an email confirmation.</div>

}
function wwVal(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function wwMsg(t,kind){const m=document.getElementById('ww-msg');if(!m)return;m.className='ww-msg show '+(kind||'ok');m.innerHTML=t;}
function workwearRef(){return 'VCB-'+Date.now().toString(36).toUpperCase().slice(-6);}
function workwearPayload(){
  const o=readWorkwearOrder();
  const rep={name:wwVal('ww-repname'),branch:wwVal('ww-branch'),email:wwVal('ww-email'),embName:wwVal('ww-embname')};
  return {ref:workwearRef(),ts:new Date().toISOString(),rep,lines:o.lines,subtotal:o.subtotal,credit:o.credit,pay:o.pay};
}
function workwearText(p){
  let s=`VICTORY TEAM KIT ORDER — ${p.ref}\n`;
  s+=`Rep: ${p.rep.name||'-'}   Branch: ${p.rep.branch||'-'}\n`;
  s+=`Email: ${p.rep.email||'-'}   Embroidery name: ${p.rep.embName||'-'}\n\n`;
  p.lines.forEach(l=>{ s+=`${l.qty}x ${l.label} [${l.code}] — size ${l.size}, ${l.colour}${l.addName?', +name':''}${l.addPocket?', +pocket':''}  =  ${wwMoney(l.lineTotal)}\n`; });
  s+=`\nSubtotal: ${wwMoney(p.subtotal)} +gst\nCredit:   -${wwMoney(p.credit)}\nYou pay:  ${wwMoney(p.pay)} +gst\n`;
  return s;
}
function mailtoWorkwear(p){
  const subj=`Team Kit order ${p.ref} — ${p.rep.name||'rep'}`;
  window.location.href=`mailto:${encodeURIComponent(ORDER_EMAIL)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(workwearText(p))}`;
}
function copyWorkwear(){
  const p=workwearPayload();
  if(!p.lines.length){ wwMsg('Add at least one item first.','err'); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(workwearText(p)).then(()=>wwMsg('Order details copied to your clipboard.','ok'),()=>wwMsg('Couldn’t copy — try the email option instead.','err'));
  } else { mailtoWorkwear(p); }
}
function submitWorkwear(){
  const p=workwearPayload();
  if(!p.lines.length){ wwMsg('Add at least one item to your kit first.','err'); return; }
  if(!p.rep.name){ wwMsg('Please add your name so we know whose kit this is.','err'); return; }
  if(!/.+@.+\..+/.test(p.rep.email)){ wwMsg('Please add a valid email for your order confirmation.','err'); return; }
  if(p.lines.some(l=>l.addName)&&!p.rep.embName){ wwMsg('You ticked “add my name” — type the name to embroider up top.','err'); return; }
  const btn=document.querySelector('.ww-submit'); if(btn) btn.disabled=true;
  const first=(p.rep.name.split(' ')[0]||'');
  const ok=()=>wwMsg(`Order <b>${p.ref}</b> sent — thanks ${first}! A confirmation is on its way to ${p.rep.email}, with your $100 credit applied. You can close this or start another.`,'ok');
  if(ORDER_ENDPOINT){
    fetch(ORDER_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)})
      .then(ok).catch(()=>{ mailtoWorkwear(p); ok(); });
  } else { mailtoWorkwear(p); ok(); }
}
