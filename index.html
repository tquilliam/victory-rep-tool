Style, choose Piccolo. If it won't appear, check the width is within range; if still blocked, email your state manager.", "t": "Canonical", "f": "Med"}, {"c": "Insyte - Quoting & Build", "q": "How do I quote a curtain that's wider than the maximum track width (e.g. 7.4m)?", "a": "Split the width across two separate lines. Add a supply note to include 1x track joiner and state which item the track joins to. Free-flow one or two curtains on each track so they can bunch to the sides.", "t": "Canonical", "f": "High"}, {"c": "Insyte - Quoting & Build", "q": "How do I quote a curved/bay curtain track?", "a": "Use the Residential track (Designer track can't be curved) on Urbane Standard curtains. Enter two separate lines, each with the required bends, and add a track joiner in supply notes. Free-flow a curtain on each track. The curve/bend options appear when you build the item.", "t": "Canonical", "f": "Med"}, {"c": "Insyte - Quoting & Build", "q": "How do I quote an internal-corner 'through and butt' curtain - do I deduct off both blinds?", "a": "See the corner diagram (Chic corner single). Take the deduction off the butting blind. Send the job number to a manager if unsure.", "t": "Situational", "f": "Low"}, {"c": "Insyte - Quoting & Build", "q": "How do I select the second (back) fabric on a double roller (Urbane AUS or Chic)?", "a": "Add another line for the second blind. On each item set 'Double Position' to Front or Back, and tick 'Double Roller with item on this order'. Both fabrics must be from the same range/system.", "t": "Canonical", "f": "High"}, {"c": "Insyte - Quoting & Build", "q": "How do I select which blades operate above/below the midrail on a shutter?", "a": "Choose the split option (e.g. Halfway Above Midrail). Read the info note (grey/red circle next to the midrail question) as it may tell you to split again depending on the shutter size.", "t": "Canonical", "f": "Low"}, {"c": "Insyte - Quoting & Build", "q": "The minimum drop keeps increasing / won't accept my drop for a continuous Urbane fabric - what's wrong?", "a": "This is usually a fabric/spec limit interacting with the size. Re-check the fabric's min/max on spec, and send the job number to a manager if it still won't build.", "t": "Situational", "f": "Low"}, {"c": "Insyte - Quoting & Build", "q": "What product do I select for sliding plantation shutters?", "a": "Shutter - TRACKS.", "t": "Canonical", "f": "Med"}, {"c": "Fitting & Feasibility", "q": "Can we do Shade Pro / awning on a sloped roof or with a height difference side-to-side?", "a": "Check with Hardback technical - a large slope (e.g. 200mm difference) may cause too much movement. Alpha M or Shade Pro are the options for windy/unsupported spots; verify with technical.", "t": "Situational", "f": "Low"}, {"c": "Fitting & Feasibility", "q": "Can we do a corner (90-degree) window shutter?", "a": "Yes - use a corner bar. See the Shutter presentation (p17 configs) in the Product Information Database.", "t": "Canonical", "f": "Low"}, {"c": "Fitting & Feasibility", "q": "Can we fit to Hebel / hollow (Besser) brick?", "a": "Hebel: generally can't fix to it - flag it. Hollow/Besser brick makes anchoring very difficult (e.g. folding arms) - confirm with technical (Grant) and send a photo before committing.", "t": "Situational", "f": "Med"}, {"c": "Fitting & Feasibility", "q": "Can we fix a folding arm awning to gutters / where there's no structural eave?", "a": "No - FAA needs a structural fixing (eaves or roof rafters). If we can't access something structural, we can't do it. Rafter brackets through the fascia below the gutter can work if they reach the rafters. Offer an alternative if there's nothing structural.", "t": "Situational", "f": "High"}, {"c": "Fitting & Feasibility", "q": "Can we mount curtains/blinds on a concrete or top-fix ceiling?", "a": "Yes - top/ceiling fix is supported; for sheers needing a shallow (e.g. 70mm) cavity use Urbane (Chic won't fit that depth). Confirm bracket depth against the space.", "t": "Situational", "f": "Low"}, {"c": "Fitting & Feasibility", "q": "Can we supply awnings with no bottom/ground fixings (customer doesn't want to drill the patio)?", "a": "We can supply-only, but it needs customer + technical sign-off, and warranty is limited if installed without securing. We would always want it secured - if they decline, it's supply-only and installation is the purchaser's responsibility.", "t": "Situational", "f": "Med"}, {"c": "Fitting & Feasibility", "q": "Do we need scaffolding for a double-storey install?", "a": "Yes, for safety on double-storey work. Email Grant directly for guidance.", "t": "Canonical", "f": "Med"}, {"c": "Fitting & Feasibility", "q": "How is a fixed guide awning headbox fixed when the window is right up under the roof?", "a": "It fits across the face of the bricks - measure the reveal and add 175mm each side. It sits flush against the bricks with a small gap behind (only visible from inside or directly underneath).", "t": "Canonical", "f": "Med"}, {"c": "Motors & Electrical", "q": "Can we do roller shutters on 1st/upper floor windows?", "a": "Yes, but only with a hardwired motor (not battery). Double-storey work will usually need scaffolding - email Grant for guidance.", "t": "Canonical", "f": "Med"}, {"c": "Motors & Electrical", "q": "Do folding arm awning motors need an electrician / hardwiring?", "a": "Yes - all FAA motors are hardwired and need an electrician. Add an Electrical line to the quote. Rechargeable is not available on folding arm awnings (if it were, the motor options would show it).", "t": "Canonical", "f": "High"}, {"c": "Motors & Electrical", "q": "Does the client source their own electrician for motorised awnings (QLD)?", "a": "In QLD the customer sources their own electrician - we don't have a third-party arrangement. (Check locally, e.g. with Cynthia, for other states.)", "t": "Situational", "f": "Low"}, {"c": "Motors & Electrical", "q": "How does a motorised folding arm awning come in during a power outage - is there a manual crank override?", "a": "No manual override on motorised folding arms. The customer needs a battery back-up installed in the roof, otherwise the only crank option is a manual crank-operated folding arm.", "t": "Canonical", "f": "Med"}, {"c": "Motors & Electrical", "q": "If the customer supplies their own electrician, do we still charge for the roller-blind electrical work?", "a": "You still charge for our part (programming, setting limits, testing). If the customer's electrician does the hardwiring, quote the blinds as normal and simply don't add an electrical line - electrical cost can also be discounted up to 30%.", "t": "Situational", "f": "Med"}, {"c": "Motors & Electrical", "q": "What's the difference between a wall-mounted remote and a wall switch (RTS vs hardwired)?", "a": "RTS is wall-mounted but NOT hardwired (radio remote). A hardwired wall switch requires an electrician. Check whether the motor option lists a charger (rechargeable) before assuming.", "t": "Canonical", "f": "Med"}, {"c": "Warranty", "q": "What is the warranty on Shade Pro / most products?", "a": "Everything is 5 years EXCEPT Chic products, which are 3 years. (So Shade Pro is 5 years, not 5-only-Chic-3.)", "t": "Canonical", "f": "High"}, {"c": "Warranty", "q": "What is the warranty on plantation shutters?", "a": "5 years manufacturing warranty.", "t": "Canonical", "f": "Med"}, {"c": "Product Availability", "q": "Can the security shutter be manual instead of motorised?", "a": "No - security shutters don't have a manual option.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Can we do PVC awning fabric replacement?", "a": "We can sell a new PVC awning (Alpha SRS) but not a fabric-only replacement.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Can we do centre-opening vertical blinds?", "a": "Yes - centre opening on verticals is available in chain-and-cord control only (left or right, meaning the side the chain/cord sits on). Don't butt two sets or you get a larger light gap.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Can we motorise / retrofit another company's existing blinds?", "a": "No - we don't retrofit or motorise blinds we didn't make. If it isn't a product we made, we can't do the motor/track only.", "t": "Canonical", "f": "Med"}, {"c": "Product Availability", "q": "Can we replace another company's curtain tracks?", "a": "No - we don't replace tracks that aren't ours.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Do we do Roman blinds - and in what fabrics?", "a": "Roman blinds are Chic fabrics only. Urbane fabrics can be used in a Premium SF Roman (much more expensive, different look), but fabrics with a coated backing can't be offered as a Roman.", "t": "Canonical", "f": "Med"}, {"c": "Product Availability", "q": "Do we do a sheerweave / silver-backed fabric for roller blinds?", "a": "Yes - look in the Urbane range of rollers (Vertilux-style HA rail / silver-backed options).", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Do we do curved curtain tracks?", "a": "Yes - Urbane or Premium, on Residential track (Designer can't be curved).", "t": "Canonical", "f": "Med"}, {"c": "Product Availability", "q": "Do we do mosquito-net fabric curtains/blinds or ultra-thin (<20mm) side tracks?", "a": "No - we don't offer mosquito-net fabrics or side tracks that thin. Sometimes we have to tell the customer no.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Do we do retractable flyscreens?", "a": "No, we don't do them - but we can pass on a recommendation for the client.", "t": "Canonical", "f": "Low"}, {"c": "Product Availability", "q": "Do we offer pelmets over rollers/curtains?", "a": "Yes. On Urbane rollers, ticking 'Cassette' gives an aluminium fascia; for a timber/fabric-wrapped pelmet add a separate new-product line. Confirm fabric-wrapped options with the customer's preference.", "t": "Canonical", "f": "Med"}, {"c": "Fabrics & Colour Matching", "q": "Does fabric colour affect heat (awnings / folding arms)?", "a": "Yes - darker colours absorb more heat, lighter colours reflect. A darker acrylic gives a darker shade underneath. For a full blockout it makes little difference.", "t": "Canonical", "f": "Low"}, {"c": "Fabrics & Colour Matching", "q": "How do I match a Chic fabric to its closest Urbane/Premium equivalent (e.g. Porto Sepia, Volterra Eggshell)?", "a": "There's no fixed cross-reference - match it using your Premium/Urbane sample folder, or email Shamika/purchasing to help identify the closest equivalent. Always confirm the match on Insyte.", "t": "Situational", "f": "Med"}, {"c": "Fabrics & Colour Matching", "q": "Is a discontinued-looking fabric still available (e.g. Everview Plus 1%)?", "a": "Whatever is in Insyte is correct and is the source of truth - if it's in Insyte you can sell it, even if web searches suggest it's discontinued.", "t": "Canonical", "f": "Low"}, {"c": "Fabrics & Colour Matching", "q": "Is the Chic roller fabric just polyester or does it have a PVC coating?", "a": "Confirm per fabric on the spec/sample - Chic roller fabrics vary; check the specific fabric's composition.", "t": "Situational", "f": "Low"}, {"c": "Samples & Assets", "q": "ASSET GAP - Photos reps repeatedly ask for and can't find", "a": "Recurring photo requests with no internal library: Shade Pro installed + side channel detail (asked 5+ times), spring roller awning with bottom rail/pocket, sheer fully stacked L/R, top-fix track with curtain open (what's visible), Creto Cotton s-fold, awnings on cream/monument brick, 50mm aluminium Venetians, full-cassette folding arm (projected + retracted), fixed shutter with top/bottom U-track. Reps currently pull from Hardback's website as a workaround.", "t": "Asset-gap", "f": "High"}, {"c": "Samples & Assets", "q": "Where are the Builders/BR range roller samples?", "a": "They're in your Chic sample folder but without a divider. If unsure (VIC), check with Shak. Note: Builders range often isn't the cheapest - Urbane AUS rollers can come in cheaper.", "t": "Canonical", "f": "Low"}, {"c": "Samples & Assets", "q": "Where are the Veri Shade samples / colours?", "a": "Veri Shade samples are on their own separate hanger - request one from the office if you didn't get it in training. Current colours: pure white, antique white, soft grey, shell, fawn, dark grey. (Black is no longer available.)", "t": "Canonical", "f": "Med"}, {"c": "Samples & Assets", "q": "Where do I find roller shutter colour samples?", "a": "You should have the slat sampling on hand (small versions of the slats). Spec sheets are in the Product Information Database / SharePoint.", "t": "Canonical", "f": "Med"}, {"c": "Samples & Assets", "q": "Where do I find the vertical blind track-colour samples?", "a": "Use the colours from the Premium Roller bottom rails as your track-colour samples.", "t": "Canonical", "f": "Low"}, {"c": "Samples & Assets", "q": "Where's the spec sheet for [product]?", "a": "Spec sheets live in the Product Information Database / SharePoint. Known current files: Urbane AUS Roller (26.11.25), Shade Pro Hardback + Shade Pro Patio Blind Cheat Sheet, Roller Chic Guide, Roller Shutter M2M Catalogue (deductions p28-29). Insyte is the source of truth if a spec sheet and Insyte disagree.", "t": "Canonical", "f": "High"}, {"c": "Samples & Assets", "q": "Where's the swatch for fixed-guide-awning headbox colours?", "a": "In the Hardback awnings book (it's in there as a swatch).", "t": "Canonical", "f": "Low"}, {"c": "Samples & Assets", "q": "Which Venetian bottom rail / valance design is most common?", "a": "For a modern clean-line look, Valance type #1 and Bottom Rail type #3. Samples should be in your Venetian sample set.", "t": "Canonical", "f": "Low"}, {"c": "Care & Cleaning", "q": "Can our curtains be washed / how are they cleaned?", "a": "It depends on the fabric - we provide the supplier's care guidance (usually short info on the fabric). Direct customers to those recommendations; we don't provide a cleaning service.", "t": "Canonical", "f": "Low"}, {"c": "Care & Cleaning", "q": "How do I remove/clean a fixed shutter (top and bottom U-channel)?", "a": "Order a U-frame where the top channel is deeper than the base - lift up and pull the bottom out. Fixed top and bottom.", "t": "Canonical", "f": "Low"}, {"c": "Admin & Promotions", "q": "How are quotes not sending / bouncing back handled?", "a": "Known issue. Workaround: restart your computer, log out of Insyte and back in, and CC yourself on the quote. This usually lets it send.", "t": "Canonical", "f": "Med"}, {"c": "Admin & Promotions", "q": "If a lead was booked during a sale but the appointment is after it ends, do they still get the discount?", "a": "Yes - if the lead was booked while the sale was running, the discount still applies to the quote even if the appointment is after the sale ends.", "t": "Canonical", "f": "Med"}, {"c": "Admin & Promotions", "q": "Where do I find install/closure dates (e.g. Christmas)?", "a": "Tracy emails install dates every Friday - check that email for closure and install dates.", "t": "Canonical", "f": "Low"}, {"c": "Sales Technique", "q": "How do I handle competitors selling 'premium' PVC shutters (Thermo 25 etc.) or a very long warranty?", "a": "These are rebranded standard PVC shutters (Thermalite, Polytherm etc.) - all avoiding a classic PVC shutter we've made ~35 years. Insulation claims are usually the maker's own, with no independent testing/R-values. A very long warranty (e.g. 25yr) is a red flag - long warranties from companies that may not last (e.g. Kresta discontinuing a shutter mid-warranty). We offer a 5-year manufacturing warranty on a product that lasts ~20 years if looked after. Also sell the concealed mechanism (vs Clearview) for longevity.", "t": "Canonical", "f": "Med"}];
let pbState={q:'',cat:'All'};
const PB_SHORT={'Insyte - Quoting & Build':'Insyte','Fitting & Feasibility':'Fitting','Motors & Electrical':'Motors','Product Availability':'Availability','Fabrics & Colour Matching':'Fabrics','Samples & Assets':'Samples','Admin & Promotions':'Admin','Care & Cleaning':'Care','Sales Technique':'Sales'};
function pbEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildPlaybookPanel(){
  return `<section class="panel" id="panel-playbook" role="tabpanel" aria-labelledby="tab-playbook" tabindex="0">
    <div class="phead"><div class="idx">Ask the team</div><h2 class="display">Playbook</h2>
      <div class="pos">The answers reps ask each other most &mdash; how to build it in Insyte, where the samples live, and what we can (and can&rsquo;t) do. Search it, or filter by topic.</div></div>
    <div class="pbsearch"><input id="pbQ" type="search" placeholder="Search the playbook&hellip;  e.g. double roller, warranty, Hebel" aria-label="Search the playbook"></div>
    <div id="pbChips" class="chips" data-pb></div>
    <p class="small muted" id="pbCount"></p>
    <div id="pbBody"></div>
  </section>`;
}
function renderPlaybook(){
  const chips=document.getElementById('pbChips'); if(!chips) return;
  const cats=['All',...[...new Set(PLAYBOOK.map(p=>p.c))]];
  chips.innerHTML=cats.map(c=>`<button type="button" data-v="${pbEsc(c)}" aria-pressed="${String(c===pbState.cat)}">${c==='All'?'All':pbEsc(PB_SHORT[c]||c)}</button>`).join('');
  const q=pbState.q.trim().toLowerCase();
  const list=PLAYBOOK.filter(p=>(pbState.cat==='All'||p.c===pbState.cat)&&(!q||(p.q+' '+p.a+' '+p.c).toLowerCase().includes(q)));
  const shownCats=[...new Set(list.map(p=>p.c))];
  const body=shownCats.map(c=>{
    const items=list.filter(p=>p.c===c).map(p=>{
      const t=(p.t||'').toLowerCase();
      const flag=t.indexOf('situational')>=0?'<span class="pbflag" title="Site-specific — use judgement">situational</span>':(t.indexOf('asset')>=0?'<span class="pbflag gap">note</span>':'');
      return `<details><summary>${pbEsc(p.q)}${flag}</summary><div class="a">${pbEsc(p.a)}</div></details>`;
    }).join('');
    return `<h4 class="mini pbcat">${pbEsc(c)}</h4><div class="faq">${items}</div>`;
  }).join('');
  document.getElementById('pbBody').innerHTML=list.length?body:'<p class="muted" style="padding:18px 0">No matches — try a different word.</p>';
  document.getElementById('pbCount').textContent=list.length+' of '+PLAYBOOK.length+' answers';
}

const TABS=[...CATEGORIES.map(c=>({id:c.id,label:c.label})),{id:"playbook",label:"Playbook",accent:true},{id:"workwear",label:"Team Kit",accent:true},{id:"fabrics",label:"Fabrics",accent:true},{id:"gallery",label:"Gallery",accent:true},{id:"leaderboard",label:"Leaderboard",accent:true},{id:"visualiser",label:"Visualiser",accent:true}];
function selectTab(id){
  activeTab=id;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.setAttribute('aria-selected',String(b.dataset.id===id)));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
  window.scrollTo({top:0,behavior:'smooth'});
  try{history.replaceState(null,'','#'+id);}catch(e){}
}
function renderAll(){
  const nav=document.getElementById('tabs'), main=document.getElementById('main');
  nav.innerHTML=TABS.map(t=>`<button role="tab" id="tab-${t.id}" data-id="${t.id}" aria-selected="false" class="${t.accent?'accent':''}">${t.label}</button>`).join('');
  main.innerHTML='';
  CATEGORIES.forEach(c=>main.appendChild(el(buildCategoryPanel(c))));
  main.appendChild(el(buildWorkwearPanel()));
  main.appendChild(el(buildFabricsPanel()));
  main.appendChild(el(buildGalleryPanel()));
  main.appendChild(el(buildLeaderboardPanel()));
  main.appendChild(el(buildVizPanel()));
  main.appendChild(el(buildPlaybookPanel()));
  renderPlaybook();
  renderLeaderboard();
  renderGallery();
  renderFabrics();
  updateWorkwearSummary();
  selectTab(activeTab);
}
/* Delegated handlers are bound ONCE. renderAll() can run again (e.g. after the sheet
   loads) without stacking duplicate listeners on #tabs / #main. */
function bindOnce(){
  const nav=document.getElementById('tabs'), main=document.getElementById('main');
  nav.addEventListener('click',e=>{const b=e.target.closest('button');if(b)selectTab(b.dataset.id);});

  const toggleRange=row=>{
    const next=row.nextElementSibling;
    if(!next||!next.classList.contains('colrow')) return;
    const open=next.hidden;
    next.hidden=!open;
    row.setAttribute('aria-expanded',String(open));
    row.classList.toggle('open',open);
    const ch=row.querySelector('.chev'); if(ch) ch.innerHTML=open?'&minus;':'+';
  };
  const toggleRep=row=>{
    lbState.open = (lbState.open===row.dataset.rep) ? null : row.dataset.rep;
    renderLeaderboard();
  };

  main.addEventListener('click',e=>{
    const snav=e.target.closest('.subnav button');
    if(snav){ const nav=snav.closest('.subnav'), cat=nav.dataset.cat, pid=snav.dataset.pid;
      if(catState[cat]!==pid){ catState[cat]=pid;
        nav.querySelectorAll('button').forEach(b=>b.setAttribute('aria-selected',String(b===snav)));
        document.getElementById('catbody-'+cat).innerHTML=productInner(pid); }
      window.scrollTo({top:0,behavior:'smooth'}); return; }
    const pbc=e.target.closest('.chips[data-pb] button');
    if(pbc){ pbState.cat=pbc.dataset.v; renderPlaybook(); return; }
    const wwStep=e.target.closest('#panel-workwear .ww-minus, #panel-workwear .ww-plus');
    if(wwStep){
      const inp=wwStep.parentElement.querySelector('.ww-qty');
      let v=parseInt(inp.value,10)||0; v+=wwStep.classList.contains('ww-plus')?1:-1;
      inp.value=Math.max(0,Math.min(99,v)); updateWorkwearSummary(); return;
    }
    if(e.target.closest('.ww-submit')){ submitWorkwear(); return; }
    if(e.target.closest('.ww-copy')){ copyWorkwear(); return; }
    const chip=e.target.closest('.chips[data-lb] button');
    if(chip){
      const group=chip.closest('.chips');
      group.querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',String(x===chip)));
      lbState[group.dataset.lb]=chip.dataset.v;
      lbState.open=null;
      renderLeaderboard();
      return;
    }
    const ftype=e.target.closest('.fabtype button');
    if(ftype){ fabState.type=ftype.dataset.k; renderFabrics(); return; }
    const ftime=e.target.closest('.fabtime button');
    if(ftime){ fabState.time=ftime.dataset.k; renderFabrics(); return; }
    const gtoggle=e.target.closest('.gl-toggle');
    if(gtoggle){ galExpand[gtoggle.dataset.key]=!galExpand[gtoggle.dataset.key]; renderGallery(); return; }
    const gclear=e.target.closest('.gl-clear');
    if(gclear){ ['product','window','type','tag'].forEach(k=>galState[k].clear()); renderGallery(); return; }
    const gchip=e.target.closest('.chips[data-gl] button');
    if(gchip){
      const key=gchip.closest('.chips').dataset.gl, v=gchip.dataset.v, set=galState[key];
      if(v==='All') set.clear();
      else if(set.has(v)) set.delete(v);
      else set.add(v);
      renderGallery();
      return;
    }
    const gtile=e.target.closest('.gtile');
    if(gtile){ openLightbox(gtile.dataset.src, gtile.dataset.cap); return; }
    if(e.target.closest('.glightbox')){ closeLightbox(); return; }
    const fit=e.target.closest('.mcfit button');
    if(fit){
      const b=fit.closest('.mcheck');
      b.dataset.fit=fit.dataset.v;
      b.querySelectorAll('.mcfit button').forEach(x=>x.setAttribute('aria-pressed',String(x===fit)));
      b.querySelectorAll('.mc-face-only').forEach(x=>x.hidden = fit.dataset.v!=='face');
      b.querySelector('.mc-result').innerHTML='';
      return;
    }
    const go=e.target.closest('.mc-go');
    if(go){ runMeasureCheck(go.closest('.mcheck')); return; }
    const clr=e.target.closest('.mc-reset');
    if(clr){ const b=clr.closest('.mcheck');
      b.querySelectorAll('input').forEach(i=>i.value='');
      b.querySelector('.mc-result').innerHTML='';
      updateMeasureHint(b); return; }
    const rrow=e.target.closest('.rrow');  if(rrow){ toggleRange(rrow); return; }
    const lbrow=e.target.closest('.lbrow'); if(lbrow){ toggleRep(lbrow); return; }
  });
  main.addEventListener('input',e=>{
    const pbq=e.target.closest('#pbQ');
    if(pbq){ pbState.q=pbq.value; renderPlaybook(); return; }
    const mc=e.target.closest('.mcheck');
    if(mc && (e.target.classList.contains('mc-w')||e.target.classList.contains('mc-d'))) updateMeasureHint(mc);
    if(e.target.closest('#panel-workwear')) updateWorkwearSummary();
  });
  main.addEventListener('change',e=>{
    if(!e.target.closest('#panel-workwear')) return;
    if(e.target.classList.contains('ww-colour')){
      const card=e.target.closest('.ww-card'), it=WORKWEAR.find(w=>w.code===card.dataset.code);
      const art=card.querySelector('.ww-art');
      if(it && !it.img && art) art.innerHTML=wwArt(it,e.target.value);
    }
    updateWorkwearSummary();
  });
  main.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ closeLightbox(); }
    // Enter inside the measure check runs it
    if(e.key==='Enter'){
      const mc=e.target.closest('.mcheck');
      if(mc && e.target.tagName==='INPUT'){ e.preventDefault(); runMeasureCheck(mc); return; }
    }
    if(e.key!=='Enter' && e.key!==' ') return;
    const rrow=e.target.closest('.rrow');
    if(rrow){ e.preventDefault(); toggleRange(rrow); return; }
    const lbrow=e.target.closest('.lbrow');
    if(lbrow){ e.preventDefault(); toggleRep(lbrow); return; }
  });
}
function boot(){
  let start=(location.hash||'').replace('#','');
  const _c=CATEGORIES.find(c=>c.products.includes(start));
  if(_c){ catState[_c.id]=start; start=_c.id; }
  if(TABS.some(t=>t.id===start)) activeTab=start;
  bindOnce();
  renderAll();
  loadFromSheet().then(ok=>{ setStatus(ok); if(ok) renderAll(); })
    .catch(()=>setStatus(false));
}
boot();
</script>
